<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم المدير - CyberSec Store</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    
    <nav class="navbar">
        <div class="nav-brand">👑 لوحة التحكم</div>
        <div class="nav-links">
            <a href="index.html">الرئيسية</a>
            <button onclick="logout()" class="logout-btn">🚪 خروج</button>
        </div>
    </nav>

    <main class="container">
        <div class="admin-tabs">
            <button class="tab-btn active" onclick="showTab('products')">📦 المنتجات</button>
            <button class="tab-btn" onclick="showTab('prices')">💰 الأسعار</button>
            <button class="tab-btn" onclick="showTab('orders')">📋 الطلبات</button>
            <button class="tab-btn" onclick="showTab('settings')">⚙️ الإعدادات</button>
        </div>

        <!-- تبويب المنتجات -->
        <div id="products-tab" class="admin-tab active">
            <div class="admin-panel">
                <div class="add-product-form">
                    <h2>➕ إضافة منتج جديد</h2>
                    <div class="form-row">
                        <input type="text" id="product-name" placeholder="اسم المنتج">
                        <select id="product-category">
                            <option value="tool">أداة</option>
                            <option value="design">تصميم</option>
                            <option value="ban">خدمة باند</option>
                        </select>
                    </div>
                    <textarea id="product-desc" placeholder="وصف المنتج" rows="3"></textarea>
                    <div class="form-row">
                        <input type="number" id="product-price" placeholder="السعر">
                        <input type="url" id="product-image" placeholder="رابط الصورة">
                    </div>
                    <button onclick="addProduct()" class="submit-btn">➕ إضافة المنتج</button>
                </div>

                <div class="products-list">
                    <h2>📦 المنتجات الحالية</h2>
                    <div id="products-container" class="products-grid"></div>
                </div>
            </div>
        </div>

        <!-- تبويب الأسعار -->
        <div id="prices-tab" class="admin-tab">
            <div class="admin-panel">
                <h2>💰 تعديل الأسعار</h2>
                <div class="prices-form">
                    <div class="price-group">
                        <label>سعر تصميم موقع بسيط:</label>
                        <input type="number" id="simple-design-price" class="price-input">
                    </div>
                    <div class="price-group">
                        <label>سعر تصميم موقع متكامل:</label>
                        <input type="number" id="full-design-price" class="price-input">
                    </div>
                    <div class="price-group">
                        <label>سعر فك باند انستقرام:</label>
                        <input type="number" id="insta-ban-price" class="price-input">
                    </div>
                    <div class="price-group">
                        <label>سعر فك باند فيسبوك:</label>
                        <input type="number" id="fb-ban-price" class="price-input">
                    </div>
                    <div class="price-group">
                        <label>سعر فك باند تيك توك:</label>
                        <input type="number" id="tt-ban-price" class="price-input">
                    </div>
                    <div class="price-group">
                        <label>سعر رفع حظر يوتيوب:</label>
                        <input type="number" id="yt-ban-price" class="price-input">
                    </div>
                    <button onclick="updateAllPrices()" class="submit-btn">💾 حفظ جميع الأسعار</button>
                </div>
            </div>
        </div>

        <!-- تبويب الطلبات -->
        <div id="orders-tab" class="admin-tab">
            <div class="admin-panel">
                <h2>📋 الطلبات الواردة</h2>
                <div id="orders-container">
                    <p>جاري تحميل الطلبات...</p>
                </div>
            </div>
        </div>

        <!-- تبويب الإعدادات -->
        <div id="settings-tab" class="admin-tab">
            <div class="admin-panel">
                <h2>⚙️ إعدادات البوت والإشعارات</h2>
                <div class="settings-form">
                    <div class="form-group">
                        <label>توكن بوت التليجرام:</label>
                        <input type="text" id="bot-token" placeholder="أدخل توكن البوت">
                    </div>
                    <div class="form-group">
                        <label>معرف الشات (Chat ID):</label>
                        <input type="text" id="chat-id" placeholder="أدخل chat id">
                    </div>
                    <div class="form-group">
                        <label>رقم محفظة شام كاش:</label>
                        <input type="text" id="sham-cash-number" placeholder="رقم المحفظة">
                    </div>
                    <div class="form-group">
                        <label>صورة شخصية (رابط):</label>
                        <input type="url" id="profile-image" placeholder="رابط الصورة">
                    </div>
                    <button onclick="saveSettings()" class="submit-btn">💾 حفظ الإعدادات</button>
                </div>
                
                <div class="backup-section">
                    <h3>📦 النسخ الاحتياطي</h3>
                    <button onclick="backupData()" class="backup-btn">📥 تحميل نسخة احتياطية</button>
                    <button onclick="restoreData()" class="restore-btn">📤 استعادة نسخة احتياطية</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>© 2024 CyberSec Store - لوحة تحكم المدير</p>
    </footer>

    <script src="3d-background.js"></script>
    <script src="admin.js"></script>
</body>
                          </html>
